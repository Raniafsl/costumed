{% extends "base.html" %}
{% block title %}Admin — Costumed{% endblock %}
{% block content %}

<span class="page-eyebrow">Private</span>
<h1 class="page-title">Review queue login</h1>

{% if error %}
<p class="empty-state" style="padding: 0 0 1.5rem; font-size: 1rem; text-align: left;">{{ error }}</p>
{% endif %}

<form method="post" class="entry-form" style="max-width: 360px;">
    <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autofocus>
    </div>
    <button type="submit" class="submit-btn">Log in</button>
</form>

{% endblock %}
