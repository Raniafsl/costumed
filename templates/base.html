<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Costumed{% endblock %}</title>
    <meta name="description" content="A searchable archive of iconic film costumes — browse by genre, era, and color.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎞️</text></svg>">
</head>
<body>
    <div class="sprocket-row on-ink"></div>
    <header class="site-header">
        <a href="{{ url_for('index') }}" class="wordmark">COSTUMED</a>
        <nav>
            <a href="{{ url_for('index') }}">Archive</a>
            <a href="{{ url_for('add_look') }}">Add a Look</a>
            <a href="{{ url_for('surprise') }}" class="nav-surprise">Surprise Me</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <svg class="flourish" viewBox="0 0 120 14" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1">
            <line x1="0" y1="7" x2="42" y2="7"/>
            <circle cx="60" cy="7" r="4"/>
            <line x1="78" y1="7" x2="120" y2="7"/>
        </svg>
        <p>A costume &amp; style archive — film meets fashion.</p>
        <p class="footer-links">
            <a href="{{ url_for('privacy') }}">Privacy Policy</a>
            <span aria-hidden="true">&middot;</span>
            <a href="{{ url_for('terms') }}">Terms &amp; Guidelines</a>
        </p>
        <p class="footer-credit">
            Built by Rania Faisal
            <span aria-hidden="true">&middot;</span>
            <a href="https://www.linkedin.com/in/rania-faisal-500b5032b/">LinkedIn</a>
            <span aria-hidden="true">&middot;</span>
            <a href="https://github.com/Raniafsl">GitHub</a>
        </p>
        <p class="admin-link">
            {% if session.get('is_admin') %}
            <a href="{{ url_for('admin_queue') }}">Review queue</a>
            {% else %}
            <a href="{{ url_for('admin_login') }}">Admin</a>
            {% endif %}
        </p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
